bright2 = 54FF54
dim2 = 18B218
# ! yellow
regular3 = B26818
bright3 = FFFF54
dim3 = B26818
# ! blue
regular4 = 1818B2
bright4 = 5454FF
dim4 = 1818B2
# ! magenta
regular5 = B218B2
bright5 = FF54FF
dim5 = B218B2
# ! cyan
regular6 = 18B2B2
bright6 = 54FFFF
dim6 = 18B2B2
# ! white
