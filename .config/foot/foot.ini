[main]
term = xterm-256color
font = DejaVu Sans Mono:size=9
# font = Hack:size=9
dpi-aware = no  # auto/yes causes large cut font
pad = 2x2
underline-offset = 1px
initial-window-size-chars = 209x70
app-id = foot
title = foot
selection-target = primary

letter-spacing=1px
line-height=15px
word-delimiters=│`|"'()[]{}<>

# important: make bold text using a brighter color using our defined secondary colors
bold-text-in-bright=palette-based

[environment]
LANG = de_DE.UTF-8
LC_ALL = de_DE.UTF-8

[bell]
urgent = no
notify = no
visual = no

[scrollback]
lines = 16384
multiplier = 3.0
indicator-position = relative

[url]
launch = firefox ${url}
osc8-underline = always
# protocols = http,https,file

[cursor]
style = block
style = beam
blink = no
blink-rate = 1000
blink = yes
# color unset -> default (inverse)

[mouse]
hide-when-typing = yes
alternate-scroll-mode = yes

#[colors]
[colors-dark]
foreground = 65B22A
# background = 282828
background = 000000
bold = FFFFFF

# ! black
regular0 = 000000
bright0 = 21680D
dim0 = 000000
