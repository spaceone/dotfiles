[csd]
preferred = server
size = 26
color = ff000000
font = DejaVu Sans Mono
hide-when-maximized = no
border-width = 0
border-color = ff000000
button-width = 26
button-color = ff000000
button-minimize-color = ff000000
button-maximize-color = ff000000
button-close-color = ff000000

[key-bindings]
clipboard-copy = Control+Shift+c XF86Copy
clipboard-paste = Control+Shift+v XF86Paste
primary-paste = Shift+Insert

color-theme-toggle = Control+Shift+F10
prompt-prev = Control+Shift+z
prompt-next = Control+Shift+x

scrollback-up-page = Shift+Page_Up
scrollback-down-page = Shift+Page_Down

pipe-command-output = ["wl-copy", "--primary"] Shift+End

pipe-selected = ["/home/fbest/.config/foot/keyboard-select.sh"] Mod1+Escape Mod1+s

font-increase = Control+plus Control+equal Control+KP_Add
font-decrease = Control+minus Control+KP_Subtract
font-reset = Control+0 Control+KP_0
spawn-terminal = Control+Shift+n
unicode-input = none

[search-bindings]
cancel = Control+g Control+c Escape
commit = Return
find-prev = Control+r
find-next = Control+s
cursor-left = Left Control+b
cursor-right = Right Control+f
